{% extends 'pages/base.html' %}

{% block title %}{{ post.title }}{% endblock %}

{% block content %}
<article>
    <h1>{{ post.title }}</h1>
    <p><small>Posted on: {{ post.created_at }}</small></p>
    <hr>
    <p>{{ post.body }}</p>
</article>
<a href="/dashboard/">← Back to Dashboard</a>
{% endblock %}
