{% extends 'pages/base.html' %}

{% block title %}Delete Post{% endblock %}

{% block content %}
  <h1>Delete "{{ post.title }}"?</h1>
  <p>This cannot be undone.</p>

  <form method="POST">
    {% csrf_token %}
    <button type="submit">Yes, delete it</button>
  </form>

  <a href="/dashboard/posts/">← Cancel</a>
{% endblock %}
